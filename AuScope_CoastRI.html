<!DOCTYPE html>
<!--
    AuScope_CoastRI.html
    Interactive map of AuScope-funded CoastRI coastal monitoring sites.
    Programs: Fixed Camera Stations, Low-Cost Drone Surveys, Long-Range Drones.
    Static GeoJSON data loaded from data/ folder.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuScope CoastRI Locations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, Helvetica, sans-serif; display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background: #282572; color: #fff; padding: 4px 16px; min-height: 36px;
        }
        .header-title { font-size: 18px; font-weight: 400; letter-spacing: 0.3px; }
        .header-logo img { height: 36px; }

        /* Map */
        #map { flex: 1; width: 100%; }

        /* Popups */
        .leaflet-popup-content-wrapper { background: rgba(255, 255, 255, 0.92) !important; }
        .leaflet-popup-content { margin: 10px 14px !important; font-family: Arial, Helvetica, sans-serif; font-size: 13px; line-height: 1.6; }
        .popup-name { font-weight: 700; font-size: 14px; color: #282572; }
        .popup-program { font-size: 11px; color: #6b7280; margin-top: 2px; }
        .popup-detail { font-size: 12px; margin-top: 4px; }

        /* Controls */
        .leaflet-control-zoom { display: none !important; }
        .toolbar-wrap, .toolbar-wrap .leaflet-bar { background: none !important; border: none !important; box-shadow: none !important; }
        .tools-toggle { display: block; width: 30px; height: 30px; line-height: 30px; text-align: center; background: rgba(255,255,255,0.3); border-radius: 4px; border: 2px solid rgba(0,0,0,0.2); cursor: pointer; font-size: 18px; color: #333; text-decoration: none; }
        .tools-toggle:hover { background: rgba(255,255,255,0.95); }
        .toolbar-buttons { display: none; margin-top: 4px; }
        .toolbar-buttons.open { display: block; }
        .btn-group { margin-top: 4px; }
        .btn-group:first-child { margin-top: 0; }
        .btn-group a { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: #fff; border: 2px solid rgba(0,0,0,0.2); cursor: pointer; text-decoration: none; }
        .btn-group a:first-child { border-radius: 4px 4px 0 0; }
        .btn-group a + a { border-top: none; }
        .btn-group a:last-child { border-radius: 0 0 4px 4px; }
        .btn-group a:only-child { border-radius: 4px; }
        .btn-group a:hover { background: #f0f0f0; }
        .search-panel { display: none; background: #fff; border-radius: 6px; border: 2px solid rgba(0,0,0,0.2); box-shadow: 0 1px 5px rgba(0,0,0,0.4); padding: 4px 10px; margin-top: 6px; }
        .search-panel.open { display: block; }
        .search-panel input { border: none; outline: none; font-family: Arial, Helvetica, sans-serif; font-size: 13px; width: 200px; }
        .search-results { max-height: 200px; overflow-y: auto; margin-top: 4px; }
        .search-results div { padding: 4px 6px; cursor: pointer; font-size: 12px; border-radius: 3px; font-family: Arial, Helvetica, sans-serif; }
        .search-results div:hover { background: #eff6ff; }

        /* Footer / Legend */
        .footer {
            display: flex; align-items: center; justify-content: center; gap: 24px;
            background: #282572; color: #fff; padding: 6px 16px; min-height: 36px;
            font-family: Arial, Helvetica, sans-serif; font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-icon { display: inline-block; }

        @media (max-width: 600px) {
            .header-title { font-size: 14px; }
            .footer { flex-wrap: wrap; gap: 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-title"><span id="header-total">AuScope CoastRI Locations</span></span>
        <span class="header-logo"><img src="assets/auscope-logo.png" alt="AuScope"></span>
    </div>

    <div id="map"></div>

    <div class="footer">
        <span class="legend-item"><span class="legend-icon" id="legend-cameras"></span> <span id="legend-cameras-text">Camera Stations</span></span>
        <span class="legend-item"><span class="legend-icon" id="legend-lowcost"></span> <span id="legend-lowcost-text">Low-Cost Drones</span></span>
        <span class="legend-item"><span class="legend-icon" id="legend-longrange"></span> <span id="legend-longrange-text">Long-Range Drones</span></span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ── State ─────────────────────────────────────────────────────
        var allSites = [];
        var map = null;

        // ── Program config ────────────────────────────────────────────
        var PROGRAMS = {
            cameras:   { name: 'Fixed Camera Stations',  color: '#ef4444' },
            lowcost:   { name: 'Low-Cost Drone Surveys',  color: '#22c55e' },
            longrange: { name: 'Long-Range Drones',        color: '#3b82f6' }
        };

        // ── Helpers ──────────────────────────────────────────────────
        function esc(str) {
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // ── SVG icon generators ──────────────────────────────────────
        function triangleSVG(size, strokeColor) {
            var h = size / 2;
            return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
                + '<polygon points="' + h + ',2 ' + (size - 2) + ',' + (size - 2) + ' 2,' + (size - 2) + '" fill="#000" stroke="' + strokeColor + '" stroke-width="2" stroke-linejoin="round"/></svg>';
        }
        function triangleIcon(size, strokeColor) {
            var h = size / 2;
            return L.divIcon({ html: triangleSVG(size, strokeColor), className: '', iconSize: [size, size], iconAnchor: [h, size - 2], popupAnchor: [0, -(size - 4)] });
        }

        function diamondSVG(size, strokeColor) {
            var h = size / 2;
            return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
                + '<polygon points="' + h + ',2 ' + (size - 2) + ',' + h + ' ' + h + ',' + (size - 2) + ' 2,' + h + '" fill="#000" stroke="' + strokeColor + '" stroke-width="2" stroke-linejoin="round"/></svg>';
        }
        function diamondIcon(size, strokeColor) {
            var h = size / 2;
            return L.divIcon({ html: diamondSVG(size, strokeColor), className: '', iconSize: [size, size], iconAnchor: [h, h], popupAnchor: [0, -h] });
        }

        function circleIcon(size, strokeColor) {
            var h = size / 2;
            var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
                + '<circle cx="' + h + '" cy="' + h + '" r="' + (h - 2) + '" fill="#000" stroke="' + strokeColor + '" stroke-width="2"/></svg>';
            return L.divIcon({ html: svg, className: '', iconSize: [size, size], iconAnchor: [h, h], popupAnchor: [0, -h] });
        }

        function circleSVG(size, strokeColor) {
            var h = size / 2;
            return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
                + '<circle cx="' + h + '" cy="' + h + '" r="' + (h - 2) + '" fill="#000" stroke="' + strokeColor + '" stroke-width="2"/></svg>';
        }

        function makeIcon(program, size) {
            var color = PROGRAMS[program].color;
            if (program === 'cameras') return triangleIcon(size, color);
            if (program === 'lowcost') return diamondIcon(size, color);
            if (program === 'longrange') return circleIcon(size, color);
            return triangleIcon(size, color);
        }

        function makeLegendSVG(program) {
            var color = PROGRAMS[program].color;
            if (program === 'cameras') return triangleSVG(16, color);
            if (program === 'lowcost') return diamondSVG(16, color);
            if (program === 'longrange') return circleSVG(16, color);
            return triangleSVG(16, color);
        }

        // ── Legend icons ─────────────────────────────────────────────
        function setLegendIcons() {
            document.getElementById('legend-cameras').innerHTML = makeLegendSVG('cameras');
            document.getElementById('legend-lowcost').innerHTML = makeLegendSVG('lowcost');
            document.getElementById('legend-longrange').innerHTML = makeLegendSVG('longrange');
        }

        // ── Map initialisation ───────────────────────────────────────
        function initMap() {
            map = L.map('map', { center: [-28, 134], zoom: 5, maxZoom: 18, minZoom: 3, zoomControl: false });
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri', maxZoom: 18, opacity: 0.8 }).addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18, opacity: 0.6 }).addTo(map);

            // Collapsible toolbar
            var ToolbarControl = L.Control.extend({
                onAdd: function() {
                    var wrap = L.DomUtil.create('div', 'toolbar-wrap');
                    L.DomEvent.disableClickPropagation(wrap);
                    L.DomEvent.disableScrollPropagation(wrap);

                    var toggle = L.DomUtil.create('a', 'tools-toggle', wrap);
                    toggle.href = '#'; toggle.title = 'Map tools';
                    toggle.innerHTML = '&#x22EE;';

                    var buttons = L.DomUtil.create('div', 'toolbar-buttons', wrap);

                    var zoomGroup = L.DomUtil.create('div', 'btn-group', buttons);
                    var zoomIn = L.DomUtil.create('a', '', zoomGroup);
                    zoomIn.href = '#'; zoomIn.title = 'Zoom in'; zoomIn.innerHTML = '+'; zoomIn.style.fontSize = '18px';
                    zoomIn.onclick = function(e) { e.preventDefault(); map.zoomIn(); };
                    var zoomOut = L.DomUtil.create('a', '', zoomGroup);
                    zoomOut.href = '#'; zoomOut.title = 'Zoom out'; zoomOut.innerHTML = '&minus;'; zoomOut.style.fontSize = '18px';
                    zoomOut.onclick = function(e) { e.preventDefault(); map.zoomOut(); };

                    var homeGroup = L.DomUtil.create('div', 'btn-group', buttons);
                    var home = L.DomUtil.create('a', '', homeGroup);
                    home.href = '#'; home.title = 'Zoom to all sites';
                    home.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
                    home.onclick = function(e) { e.preventDefault(); map.setView([-28, 134], 5); };

                    var searchGroup = L.DomUtil.create('div', 'btn-group', buttons);
                    var searchBtn = L.DomUtil.create('a', '', searchGroup);
                    searchBtn.href = '#'; searchBtn.title = 'Search sites';
                    searchBtn.innerHTML = '&#x1F50D;'; searchBtn.style.fontSize = '15px';

                    var panel = L.DomUtil.create('div', 'search-panel', wrap);
                    var input = L.DomUtil.create('input', '', panel);
                    input.type = 'text'; input.placeholder = 'Search sites...';
                    var res = L.DomUtil.create('div', 'search-results', panel);

                    toggle.onclick = function(e) {
                        e.preventDefault();
                        var isOpen = buttons.classList.contains('open');
                        buttons.classList.toggle('open');
                        if (isOpen) panel.classList.remove('open');
                    };

                    searchBtn.onclick = function(e) {
                        e.preventDefault();
                        panel.classList.toggle('open');
                        if (panel.classList.contains('open')) { input.value = ''; res.innerHTML = ''; input.focus(); }
                    };

                    input.oninput = function() {
                        var q = input.value.trim().toLowerCase(); res.innerHTML = '';
                        if (q.length < 2) return;
                        allSites.filter(function(s) {
                            return s.name.toLowerCase().indexOf(q) !== -1;
                        }).slice(0, 10).forEach(function(s) {
                            var row = document.createElement('div');
                            row.textContent = s.name;
                            row.onclick = function() {
                                input.value = ''; res.innerHTML = ''; panel.classList.remove('open');
                                map.setView([s.lat, s.lng], 12, { animate: true });
                                setTimeout(function() { s.marker.openPopup(); }, 300);
                            };
                            res.appendChild(row);
                        });
                    };

                    return wrap;
                }
            });
            new ToolbarControl({ position: 'topleft' }).addTo(map);

            map.on('zoomend', function() {
                var size = Math.max(16, Math.min(32, map.getZoom() * 2.9));
                allSites.forEach(function(s) {
                    if (s.marker) s.marker.setIcon(makeIcon(s.program, size));
                });
            });
        }

        // ── Data: GeoJSON from data/ folder ──────────────────────────
        async function fetchGeoJSON(url, program) {
            try {
                var resp = await fetch(url);
                if (!resp.ok) return [];
                var geojson = await resp.json();
                return (geojson.features || []).map(function(f) {
                    var coords = f.geometry.coordinates;
                    var p = f.properties;
                    return {
                        name: p.name || '',
                        state: p.state || '',
                        status: p.status || '',
                        purpose: p.purpose || '',
                        sensor: p.camera_type || p.sensor || p.sensor_type || '',
                        airframe: p.airframe || '',
                        contact: p.contact || '',
                        lat: coords[1],
                        lng: coords[0],
                        program: program,
                        marker: null
                    };
                });
            } catch (e) {
                console.warn('Failed to load ' + url + ':', e);
                return [];
            }
        }

        // ── Popup content ────────────────────────────────────────────
        function buildPopup(s) {
            var html = '<div class="popup-name">' + esc(s.name) + '</div>'
                + '<div class="popup-program">' + esc(PROGRAMS[s.program].name) + '</div>';
            if (s.state) html += '<div class="popup-detail"><strong>State:</strong> ' + esc(s.state) + '</div>';
            if (s.status) html += '<div class="popup-detail"><strong>Status:</strong> ' + esc(s.status) + '</div>';
            if (s.sensor) html += '<div class="popup-detail"><strong>Sensor:</strong> ' + esc(s.sensor) + '</div>';
            if (s.airframe) html += '<div class="popup-detail"><strong>Airframe:</strong> ' + esc(s.airframe) + '</div>';
            if (s.purpose) html += '<div class="popup-detail"><strong>Purpose:</strong> ' + esc(s.purpose) + '</div>';
            return html;
        }

        // ── Add markers ──────────────────────────────────────────────
        function addMarkers() {
            var size = Math.max(16, Math.min(32, map.getZoom() * 2.9));
            allSites.forEach(function(s) {
                var icon = makeIcon(s.program, size);
                var m = L.marker([s.lat, s.lng], { icon: icon }).bindPopup(buildPopup(s), { maxWidth: 280 }).addTo(map);
                s.marker = m;
            });
        }

        // ── Initialise ───────────────────────────────────────────────
        setLegendIcons();
        initMap();

        Promise.all([
            fetchGeoJSON('data/coastri_cameras.geojson', 'cameras'),
            fetchGeoJSON('data/coastri_lowcost_drones.geojson', 'lowcost'),
            fetchGeoJSON('data/coastri_longrange_drones.geojson', 'longrange')
        ]).then(function(results) {
            allSites = results[0].concat(results[1]).concat(results[2]);
            addMarkers();
            map.setView([-28, 134], 5);

            var total = allSites.length;
            document.getElementById('header-total').textContent = 'AuScope CoastRI Locations - ' + total + ' sites';

            document.getElementById('legend-cameras-text').textContent = 'Camera Stations (' + results[0].length + ')';
            document.getElementById('legend-lowcost-text').textContent = 'Low-Cost Drones (' + results[1].length + ')';
            document.getElementById('legend-longrange-text').textContent = 'Long-Range Drones (' + results[2].length + ')';
        }).catch(function(err) {
            console.error('Load error:', err);
        });
    </script>
</body>
</html>
