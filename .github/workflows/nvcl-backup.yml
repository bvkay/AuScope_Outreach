name: Weekly NVCL Borehole Backup

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC (6pm AEST)
  workflow_dispatch:       # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run NVCL scraper (update mode - uses cache)
        run: python3 scripts/scrape_nvcl.py --update

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nvcl_*.geojson data/nvcl_stats.json
          git diff --cached --quiet || git commit -m "Weekly NVCL borehole backup $(date -u +%Y-%m-%d)"
          git push
