name: Weekly AuScope GNSS Station Backup

on:
  schedule:
    - cron: '0 7 * * 2'  # Weekly Tuesday 07:00 UTC (5pm AEST)
  workflow_dispatch:       # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch AuScope GNSS stations from GA CORS API
        run: |
          python3 << 'EOF'
          import json, urllib.request, datetime, sys

          UA = 'AuScope-Outreach/1.0 (https://github.com/bvkay/AuScope_Outreach)'
          AUSCOPE_NETWORK_ID = 101

          all_sites = []
          page = 0
          while True:
              url = f'https://metadata.gnss.ga.gov.au/api/corsSites?size=200&page={page}'
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': UA})
                  resp = urllib.request.urlopen(req, timeout=30)
                  data = json.loads(resp.read().decode('utf-8'))
              except Exception as e:
                  print(f'API fetch failed on page {page}: {e}')
                  if page == 0:
                      sys.exit(0)
                  break
              sites = data.get('_embedded', {}).get('corsSites', [])
              if not sites:
                  break
              all_sites.extend(sites)
              page += 1

          auscope_sites = [s for s in all_sites
                           if AUSCOPE_NETWORK_ID in [t['corsNetworkId'] for t in s.get('networkTenancies', [])]]

          if len(auscope_sites) == 0:
              print('No AuScope sites found - keeping existing backup')
              sys.exit(0)

          features = []
          for site in auscope_sites:
              coords = site.get('approximatePosition', {}).get('coordinates', [0, 0, 0])
              lat, lng = coords[0], coords[1]
              elev = coords[2] if len(coords) > 2 else 0
              if lat == 0 and lng == 0:
                  continue
              monument = site.get('monument', {}) or {}
              features.append({
                  'type': 'Feature',
                  'properties': {
                      'name': site.get('name', ''),
                      'code': site.get('fourCharacterId', ''),
                      'domesNumber': site.get('domesNumber', ''),
                      'dateInstalled': site.get('dateInstalled', '')[:10] if site.get('dateInstalled') else None,
                      'elevation': round(elev, 1),
                      'monument': monument.get('description', ''),
                      'foundation': monument.get('foundation', ''),
                      'siteStatus': site.get('siteStatus', ''),
                  },
                  'geometry': { 'type': 'Point', 'coordinates': [lng, lat] }
              })

          geojson = {
              'type': 'FeatureCollection',
              'metadata': {
                  'source': 'Geoscience Australia CORS Sites API',
                  'network': 'AUSCOPE (ID 101)',
                  'fetched': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
              },
              'features': features
          }

          with open('data/gnss_auscope.geojson', 'w') as f:
              json.dump(geojson, f, indent=2)
          print(f'Saved {len(features)} AuScope GNSS stations')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gnss_auscope.geojson
          git diff --cached --quiet || git commit -m "Weekly GNSS station backup $(date -u +%Y-%m-%d)"
          git push
