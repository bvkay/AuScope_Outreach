name: Daily AuSIS Station Backup

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC (4pm AEST)
  workflow_dispatch:       # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch AuSIS stations and availability from IRIS FDSN
        run: |
          python3 << 'EOF'
          import json, urllib.request, datetime, sys, re

          # Step 1: Fetch station metadata
          url = 'https://service.iris.edu/fdsnws/station/1/query?network=S1&level=station&format=text'
          try:
              resp = urllib.request.urlopen(url, timeout=30)
              lines = resp.read().decode('utf-8').strip().split('\n')
          except Exception as e:
              print(f'IRIS station fetch failed: {e}')
              sys.exit(0)

          stations = {}
          for line in lines[1:]:
              parts = line.split('|')
              if len(parts) < 7:
                  continue
              code = parts[1].strip()
              if code == 'TEST':
                  continue
              lat = float(parts[2].strip())
              lng = float(parts[3].strip())
              stations[code] = {
                  "code": code,
                  "name": parts[5].strip(),
                  "elevation": float(parts[4].strip()),
                  "startTime": parts[6].strip(),
                  "endTime": parts[7].strip() if len(parts) > 7 and parts[7].strip() else None,
                  "latestData": None,
                  "lat": lat,
                  "lng": lng
              }

          if len(stations) == 0:
              print('No stations returned - keeping existing backup')
              sys.exit(0)

          # Step 2: Fetch availability (latest data timestamps)
          avail_url = 'https://service.iris.edu/fdsnws/availability/1/extent?network=S1&channel=BH?,HH?&format=text'
          try:
              resp = urllib.request.urlopen(avail_url, timeout=30)
              avail_lines = resp.read().decode('utf-8').strip().split('\n')
              for line in avail_lines[1:]:
                  cols = line.strip().split()
                  if len(cols) < 8:
                      continue
                  code = cols[1]
                  end_time = cols[7]
                  if code in stations:
                      current = stations[code]["latestData"]
                      if current is None or end_time > current:
                          stations[code]["latestData"] = end_time
          except Exception as e:
              print(f'Availability fetch failed (stations still saved): {e}')

          # Step 3: Build GeoJSON
          features = []
          for s in stations.values():
              features.append({
                  "type": "Feature",
                  "properties": {
                      "code": s["code"],
                      "name": s["name"],
                      "elevation": s["elevation"],
                      "startTime": s["startTime"],
                      "endTime": s["endTime"],
                      "latestData": s["latestData"]
                  },
                  "geometry": {
                      "type": "Point",
                      "coordinates": [s["lng"], s["lat"]]
                  }
              })

          geojson = {
              "type": "FeatureCollection",
              "metadata": {
                  "source": "IRIS FDSN station + availability services",
                  "network": "S1",
                  "fetched": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
              },
              "features": features
          }

          with open('data/ausis_stations.geojson', 'w') as f:
              json.dump(geojson, f, indent=2)

          avail_count = sum(1 for s in stations.values() if s["latestData"])
          print(f'Saved {len(features)} stations ({avail_count} with availability data)')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ausis_stations.geojson
          git diff --cached --quiet || git commit -m "Daily AuSIS station backup $(date -u +%Y-%m-%d)"
          git push
